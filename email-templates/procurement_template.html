<div style="font-family: 'Inter', system-ui, sans-serif; max-width: 600px; margin: 0 auto; background-color: #f8fafc; border-radius: 24px; overflow: hidden; border: 1px solid #e2e8f0; color: #0A192F;">
  <div style="background-color: #10B981; padding: 30px; text-align: center;">
    <h1 style="color: #ffffff; margin: 0; font-size: 20px; letter-spacing: 2px; font-weight: 900; text-transform: uppercase;">
      NXVOLTA <span style="color: #0A192F;">PROCUREMENT</span>
    </h1>
  </div>
  <div style="padding: 30px 40px;">
    <div style="background-color: #ffffff; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);">
      <table role="presentation" style="width: 100%; border-collapse: collapse;">
        <tr>
          <td style="padding-bottom: 20px;">
            <div style="color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Vendor Profile</div>
            <div style="font-size: 20px; font-weight: 900; color: #0A192F;">{{company_name}}</div>
            <div style="font-size: 13px; color: #10B981; font-weight: 700;">{{website}}</div>
          </td>
        </tr>
        <tr>
          <td style="padding: 20px 0; border-top: 1px solid #f1f5f9;">
            <div style="color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Representative</div>
            <div style="font-size: 16px; font-weight: 800; color: #0A192F;">{{user_name}}</div>
            <div style="font-size: 14px; color: #64748b;">{{user_email}}</div>
          </td>
        </tr>
        <tr>
          <td style="padding: 20px 0; border-top: 1px solid #f1f5f9;">
            <div style="color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Product Category / Capacity</div>
            <div style="font-size: 16px; font-weight: 800; color: #0A192F;">{{category}}</div>
            <div style="font-size: 13px; font-weight: 700; color: #64748b; margin-top: 5px;">Cap: {{capacity}}</div>
          </td>
        </tr>
        <tr>
          <td style="padding-top: 20px; border-top: 1px solid #f1f5f9;">
            <div style="color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">Technical Description</div>
            <div style="font-size: 15px; line-height: 1.6; color: #334155; white-space: pre-wrap; padding: 15px; background-color: #f8fafc; border-radius: 12px;">{{description}}</div>
          </td>
        </tr>
      </table>
    </div>
    <div style="margin-top: 30px; text-align: center;">
      <p style="font-size: 11px; color: #94a3b8; font-weight: 600;">Supplier Onboarding • nxvolta.com</p>
    </div>
  </div>
</div>
