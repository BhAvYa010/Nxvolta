<div style="font-family: 'Inter', system-ui, sans-serif; max-width: 600px; margin: 0 auto; background-color: #f8fafc; border-radius: 24px; overflow: hidden; border: 1px solid #e2e8f0; color: #0A192F;">
  <div style="background-color: #0A192F; padding: 30px; text-align: center;">
    <h1 style="color: #ffffff; margin: 0; font-size: 20px; letter-spacing: 2px; font-weight: 900; text-transform: uppercase;">
      NXVOLTA <span style="color: #10B981;">BUSINESS LEAD</span>
    </h1>
  </div>
  <div style="padding: 30px 40px;">
    <div style="text-align: center; margin-bottom: 25px;">
      <span style="background-color: #10B981; color: #ffffff; padding: 6px 16px; border-radius: 50px; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">
        Type: {{intent}}
      </span>
    </div>
    <div style="background-color: #ffffff; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);">
      <table role="presentation" style="width: 100%; border-collapse: collapse;">
        <tr>
          <td style="padding-bottom: 20px;">
            <div style="color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Contact Details</div>
            <div style="font-size: 18px; font-weight: 800; color: #0A192F;">{{user_name}}</div>
            <div style="font-size: 15px; color: #10B981; font-weight: 700;">{{user_email}}</div>
          </td>
        </tr>
        <tr>
          <td style="padding: 20px 0; border-top: 1px solid #f1f5f9;">
            <div style="color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Product Interest</div>
            <div style="font-size: 16px; font-weight: 800; color: #0A192F;">{{product_interest}}</div>
          </td>
        </tr>
        <tr>
          <td style="padding-top: 20px; border-top: 1px solid #f1f5f9;">
            <div style="color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">Message / Requirements</div>
            <div style="font-size: 15px; line-height: 1.6; color: #334155; white-space: pre-wrap; padding: 15px; background-color: #f8fafc; border-radius: 12px; border-left: 4px solid #0A192F;">{{message}}</div>
          </td>
        </tr>
      </table>
    </div>
    <div style="margin-top: 30px; text-align: center;">
      <p style="font-size: 11px; color: #94a3b8; font-weight: 600;">Industrial Lead Generation • nxvolta.com</p>
    </div>
  </div>
</div>
